<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResuMake - Professional Resume Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        .template-modern { font-family: 'Inter', sans-serif; }
        .template-classic { font-family: 'Merriweather', serif; }
        .template-tech { font-family: 'Roboto Mono', monospace; }
        
        .resume-preview {
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 297mm;
            width: 210mm;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        
        @media print {
            .no-print { display: none !important; }
            .resume-preview { box-shadow: none; margin: 0; }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .input-group {
            transition: all 0.3s ease;
        }
        
        .input-group:focus-within {
            transform: translateX(5px);
        }
        
        .template-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .template-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .template-card.active {
            ring: 2px solid #4F46E5;
            transform: scale(1.05);
        }
        
        .skill-tag {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .section-enter {
            animation: slideIn 0.4s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c7c7c7;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shadow-sm z-50 relative no-print">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg">
                R
            </div>
            <h1 class="text-2xl font-bold gradient-text">ResuMake</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="app.resetData()" class="px-4 py-2 text-gray-600 hover:text-red-600 transition-colors text-sm font-medium">
                Reset All
            </button>
            <button onclick="app.downloadPDF()" class="px-6 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg hover:shadow-lg hover:scale-105 transition-all font-medium flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download PDF
            </button>
        </div>
    </header>

    <div class="flex h-[calc(100vh-64px)]">
        
        <!-- Left Sidebar: Editor -->
        <aside class="w-1/2 bg-white border-r border-gray-200 overflow-y-auto no-print">
            <div class="p-6 space-y-8 max-w-2xl mx-auto">
                
                <!-- Template Selection -->
                <section class="section-enter">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"></path></svg>
                        Choose Template
                    </h2>
                    <div class="grid grid-cols-3 gap-4">
                        <div onclick="app.setTemplate('modern')" id="template-modern" class="template-card cursor-pointer rounded-xl border-2 border-indigo-500 overflow-hidden active">
                            <div class="h-32 bg-gradient-to-br from-gray-50 to-gray-100 p-4 flex flex-col gap-2">
                                <div class="h-3 w-3/4 bg-gray-300 rounded"></div>
                                <div class="h-2 w-1/2 bg-gray-200 rounded"></div>
                                <div class="mt-auto space-y-1">
                                    <div class="h-2 w-full bg-gray-200 rounded"></div>
                                    <div class="h-2 w-5/6 bg-gray-200 rounded"></div>
                                </div>
                            </div>
                            <div class="p-3 text-center font-medium text-sm">Modern</div>
                        </div>
                        
                        <div onclick="app.setTemplate('classic')" id="template-classic" class="template-card cursor-pointer rounded-xl border-2 border-transparent hover:border-gray-300 overflow-hidden">
                            <div class="h-32 bg-gradient-to-br from-amber-50 to-orange-50 p-4 font-serif">
                                <div class="text-center border-b-2 border-amber-800 pb-2 mb-2">
                                    <div class="h-3 w-2/3 mx-auto bg-amber-800 rounded"></div>
                                </div>
                                <div class="space-y-1 text-xs text-amber-900">
                                    <div class="h-2 w-full bg-amber-200 rounded"></div>
                                    <div class="h-2 w-4/5 bg-amber-200 rounded"></div>
                                </div>
                            </div>
                            <div class="p-3 text-center font-medium text-sm">Classic</div>
                        </div>
                        
                        <div onclick="app.setTemplate('tech')" id="template-tech" class="template-card cursor-pointer rounded-xl border-2 border-transparent hover:border-gray-300 overflow-hidden">
                            <div class="h-32 bg-gradient-to-br from-slate-800 to-slate-900 p-4 font-mono text-green-400">
                                <div class="text-xs mb-2">&lt;header&gt;</div>
                                <div class="h-2 w-3/4 bg-green-500 rounded mb-1"></div>
                                <div class="h-2 w-1/2 bg-green-400 rounded opacity-60"></div>
                                <div class="text-xs mt-2 text-slate-400">&lt;/header&gt;</div>
                            </div>
                            <div class="p-3 text-center font-medium text-sm">Developer</div>
                        </div>
                    </div>
                </section>

                <!-- Personal Info -->
                <section class="section-enter" style="animation-delay: 0.1s">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Personal Information
                    </h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                <input type="text" id="fullName" oninput="app.updatePersonal('name', this.value)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="John Doe">
                            </div>
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
                                <input type="text" id="jobTitle" oninput="app.updatePersonal('title', this.value)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="Senior Product Designer">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="email" oninput="app.updatePersonal('email', this.value)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="john@example.com">
                            </div>
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                                <input type="tel" id="phone" oninput="app.updatePersonal('phone', this.value)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="+1 (555) 123-4567">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                                <input type="text" id="location" oninput="app.updatePersonal('location', this.value)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="San Francisco, CA">
                            </div>
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Website/LinkedIn</label>
                                <input type="text" id="website" oninput="app.updatePersonal('website', this.value)" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="linkedin.com/in/johndoe">
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Professional Summary</label>
                            <textarea id="summary" oninput="app.updatePersonal('summary', this.value)" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all resize-none" placeholder="Brief overview of your professional background and key strengths..."></textarea>
                        </div>
                    </div>
                </section>

                <!-- Experience -->
                <section class="section-enter" style="animation-delay: 0.2s">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold flex items-center gap-2">
                            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            Experience
                        </h2>
                        <button onclick="app.addExperience()" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add Position
                        </button>
                    </div>
                    <div id="experience-list" class="space-y-4">
                        <!-- Experience items injected here -->
                    </div>
                </section>

                <!-- Education -->
                <section class="section-enter" style="animation-delay: 0.3s">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold flex items-center gap-2">
                            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
                            Education
                        </h2>
                        <button onclick="app.addEducation()" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add Education
                        </button>
                    </div>
                    <div id="education-list" class="space-y-4">
                        <!-- Education items injected here -->
                    </div>
                </section>

                <!-- Skills -->
                <section class="section-enter" style="animation-delay: 0.4s">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Skills
                    </h2>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="skill-input" onkeypress="app.handleSkillKeypress(event)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="Add a skill (e.g., JavaScript, Project Management)">
                        <button onclick="app.addSkill()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>
                    <div id="skills-container" class="flex flex-wrap gap-2">
                        <!-- Skills tags injected here -->
                    </div>
                </section>

            </div>
        </aside>

        <!-- Right Side: Live Preview -->
        <main class="w-1/2 bg-gray-100 overflow-y-auto p-8 relative">
            <div class="sticky top-0 z-10 bg-gray-100 pb-4 mb-4 border-b border-gray-200 no-print">
                <p class="text-sm text-gray-500 text-center">Live Preview • Updates in real-time</p>
            </div>
            
            <div id="resume-container" class="resume-preview template-modern p-8">
                <!-- Resume content injected here -->
            </div>
        </main>

    </div>

    <script>
        // Application State
        const app = {
            data: {
                template: 'modern',
                personal: {
                    name: 'Alex Morgan',
                    title: 'Senior Product Designer',
                    email: 'alex.morgan@email.com',
                    phone: '+1 (555) 987-6543',
                    location: 'San Francisco, CA',
                    website: 'alexmorgan.design',
                    summary: 'Creative product designer with 6+ years of experience building digital products that users love. Specialized in design systems, user research, and cross-functional collaboration. Passionate about accessible design and mentoring junior designers.'
                },
                experience: [
                    {
                        id: 1,
                        company: 'Stripe',
                        position: 'Senior Product Designer',
                        startDate: '2021',
                        endDate: 'Present',
                        description: 'Lead design for Payments team, improving checkout conversion by 25%. Established design system used across 12 product teams. Mentored 3 junior designers to promotion.'
                    },
                    {
                        id: 2,
                        company: 'Airbnb',
                        position: 'Product Designer',
                        startDate: '2018',
                        endDate: '2021',
                        description: 'Redesigned host onboarding flow, increasing completion rates by 40%. Conducted user research across 5 countries to inform internationalization strategy.'
                    }
                ],
                education: [
                    {
                        id: 1,
                        school: 'Rhode Island School of Design',
                        degree: 'BFA in Graphic Design',
                        year: '2014 - 2018',
                        details: 'Minor in Human-Computer Interaction. Dean\'s List all semesters.'
                    }
                ],
                skills: ['Figma', 'Design Systems', 'User Research', 'Prototyping', 'HTML/CSS', 'React', 'Accessibility', 'Mentoring']
            },

            init() {
                this.loadFromStorage();
                this.render();
                this.setupAutoSave();
            },

            // Template Management
            setTemplate(templateName) {
                this.data.template = templateName;
                
                // Update UI
                document.querySelectorAll('.template-card').forEach(card => {
                    card.classList.remove('active', 'border-indigo-500');
                    card.classList.add('border-transparent');
                });
                document.getElementById(`template-${templateName}`).classList.add('active', 'border-indigo-500');
                document.getElementById(`template-${templateName}`).classList.remove('border-transparent');
                
                this.render();
                this.saveToStorage();
            },

            // Personal Info Updates
            updatePersonal(field, value) {
                this.data.personal[field] = value;
                this.renderResume();
                this.saveToStorage();
            },

            // Experience Management
            addExperience() {
                const newExp = {
                    id: Date.now(),
                    company: '',
                    position: '',
                    startDate: '',
                    endDate: '',
                    description: ''
                };
                this.data.experience.push(newExp);
                this.render();
                this.saveToStorage();
            },

            updateExperience(id, field, value) {
                const exp = this.data.experience.find(e => e.id === id);
                if (exp) {
                    exp[field] = value;
                    this.renderResume();
                    this.saveToStorage();
                }
            },

            removeExperience(id) {
                this.data.experience = this.data.experience.filter(e => e.id !== id);
                this.render();
                this.saveToStorage();
            },

            // Education Management
            addEducation() {
                const newEdu = {
                    id: Date.now(),
                    school: '',
                    degree: '',
                    year: '',
                    details: ''
                };
                this.data.education.push(newEdu);
                this.render();
                this.saveToStorage();
            },

            updateEducation(id, field, value) {
                const edu = this.data.education.find(e => e.id === id);
                if (edu) {
                    edu[field] = value;
                    this.renderResume();
                    this.saveToStorage();
                }
            },

            removeEducation(id) {
                this.data.education = this.data.education.filter(e => e.id !== id);
                this.render();
                this.saveToStorage();
            },

            // Skills Management
            handleSkillKeypress(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    this.addSkill();
                }
            },

            addSkill() {
                const input = document.getElementById('skill-input');
                const skill = input.value.trim();
                if (skill && !this.data.skills.includes(skill)) {
                    this.data.skills.push(skill);
                    input.value = '';
                    this.render();
                    this.saveToStorage();
                }
            },

            removeSkill(skill) {
                this.data.skills = this.data.skills.filter(s => s !== skill);
                this.render();
                this.saveToStorage();
            },

            // Storage
            saveToStorage() {
                localStorage.setItem('resumeData', JSON.stringify(this.data));
            },

            loadFromStorage() {
                const saved = localStorage.getItem('resumeData');
                if (saved) {
                    this.data = JSON.parse(saved);
                    // Restore input values
                    Object.keys(this.data.personal).forEach(key => {
                        const el = document.getElementById(key);
                        if (el) el.value = this.data.personal[key];
                    });
                }
            },

            setupAutoSave() {
                setInterval(() => this.saveToStorage(), 5000);
            },

            resetData() {
                if (confirm('Are you sure? This will clear all your data.')) {
                    localStorage.removeItem('resumeData');
                    location.reload();
                }
            },

            // PDF Generation
            downloadPDF() {
                const element = document.getElementById('resume-container');
                const opt = {
                    margin: 0,
                    filename: `${this.data.personal.name.replace(/\s+/g, '_')}_Resume.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                // Temporarily remove scale transform for PDF generation
                element.style.transform = 'none';
                html2pdf().set(opt).from(element).save().then(() => {
                    element.style.transform = '';
                });
            },

            // Rendering
            render() {
                this.renderInputs();
                this.renderResume();
            },

            renderInputs() {
                // Render Experience Inputs
                const expContainer = document.getElementById('experience-list');
                expContainer.innerHTML = this.data.experience.map(exp => `
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group">
                        <button onclick="app.removeExperience(${exp.id})" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input type="text" value="${exp.company}" oninput="app.updateExperience(${exp.id}, 'company', this.value)" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" placeholder="Company">
                            <input type="text" value="${exp.position}" oninput="app.updateExperience(${exp.id}, 'position', this.value)" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" placeholder="Position">
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input type="text" value="${exp.startDate}" oninput="app.updateExperience(${exp.id}, 'startDate', this.value)" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" placeholder="Start Date">
                            <input type="text" value="${exp.endDate}" oninput="app.updateExperience(${exp.id}, 'endDate', this.value)" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" placeholder="End Date">
                        </div>
                        <textarea oninput="app.updateExperience(${exp.id}, 'description', this.value)" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded text-sm resize-none" placeholder="Description">${exp.description}</textarea>
                    </div>
                `).join('');

                // Render Education Inputs
                const eduContainer = document.getElementById('education-list');
                eduContainer.innerHTML = this.data.education.map(edu => `
                    <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group">
                        <button onclick="app.removeEducation(${edu.id})" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input type="text" value="${edu.school}" oninput="app.updateEducation(${edu.id}, 'school', this.value)" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" placeholder="School/University">
                            <input type="text" value="${edu.degree}" oninput="app.updateEducation(${edu.id}, 'degree', this.value)" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" placeholder="Degree">
                        </div>
                        <div class="mb-3">
                            <input type="text" value="${edu.year}" oninput="app.updateEducation(${edu.id}, 'year', this.value)" class="w-full px-3 py-2 border border-gray-300 rounded text-sm" placeholder="Year (e.g., 2018 - 2022)">
                        </div>
                        <textarea oninput="app.updateEducation(${edu.id}, 'details', this.value)" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded text-sm resize-none" placeholder="Additional details (GPA, honors, etc.)">${edu.details}</textarea>
                    </div>
                `).join('');

                // Render Skills
                const skillsContainer = document.getElementById('skills-container');
                skillsContainer.innerHTML = this.data.skills.map(skill => `
                    <span class="skill-tag inline-flex items-center gap-1 px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-medium">
                        ${skill}
                        <button onclick="app.removeSkill('${skill}')" class="hover:text-indigo-900">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </span>
                `).join('');
            },

            renderResume() {
                const { template, personal, experience, education, skills } = this.data;
                const container = document.getElementById('resume-container');
                
                // Update template class
                container.className = `resume-preview template-${template} p-8`;
                
                let html = '';
                
                if (template === 'modern') {
                    html = this.renderModernTemplate(personal, experience, education, skills);
                } else if (template === 'classic') {
                    html = this.renderClassicTemplate(personal, experience, education, skills);
                } else {
                    html = this.renderTechTemplate(personal, experience, education, skills);
                }
                
                container.innerHTML = html;
            },

            renderModernTemplate(personal, experience, education, skills) {
                return `
                    <div class="h-full flex flex-col">
                        <header class="border-b-2 border-indigo-600 pb-6 mb-6">
                            <h1 class="text-4xl font-bold text-gray-900 mb-2">${personal.name || 'Your Name'}</h1>
                            <p class="text-xl text-indigo-600 font-medium mb-3">${personal.title || 'Professional Title'}</p>
                            <div class="flex flex-wrap gap-4 text-sm text-gray-600">
                                ${personal.email ? `<span class="flex items-center gap-1">📧 ${personal.email}</span>` : ''}
                                ${personal.phone ? `<span class="flex items-center gap-1">📱 ${personal.phone}</span>` : ''}
                                ${personal.location ? `<span class="flex items-center gap-1">📍 ${personal.location}</span>` : ''}
                                ${personal.website ? `<span class="flex items-center gap-1">🔗 ${personal.website}</span>` : ''}
                            </div>
                        </header>

                        ${personal.summary ? `
                            <section class="mb-6">
                                <h2 class="text-lg font-bold text-gray-900 uppercase tracking-wider mb-3 border-b border-gray-200 pb-1">Summary</h2>
                                <p class="text-gray-700 leading-relaxed">${personal.summary}</p>
                            </section>
                        ` : ''}

                        ${experience.length ? `
                            <section class="mb-6">
                                <h2 class="text-lg font-bold text-gray-900 uppercase tracking-wider mb-4 border-b border-gray-200 pb-1">Experience</h2>
                                <div class="space-y-4">
                                    ${experience.map(exp => `
                                        <div>
                                            <div class="flex justify-between items-baseline mb-1">
                                                <h3 class="font-bold text-gray-900">${exp.position || 'Position'}</h3>
                                                <span class="text-sm text-gray-500 font-medium">${exp.startDate || 'Start'} – ${exp.endDate || 'End'}</span>
                                            </div>
                                            <p class="text-indigo-600 font-medium mb-2">${exp.company || 'Company'}</p>
                                            <p class="text-gray-700 text-sm leading-relaxed">${exp.description || ''}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </section>
                        ` : ''}

                        ${education.length ? `
                            <section class="mb-6">
                                <h2 class="text-lg font-bold text-gray-900 uppercase tracking-wider mb-4 border-b border-gray-200 pb-1">Education</h2>
                                <div class="space-y-3">
                                    ${education.map(edu => `
                                        <div>
                                            <div class="flex justify-between items-baseline">
                                                <h3 class="font-bold text-gray-900">${edu.degree || 'Degree'}</h3>
                                                <span class="text-sm text-gray-500">${edu.year || ''}</span>
                                            </div>
                                            <p class="text-indigo-600 font-medium">${edu.school || 'School'}</p>
                                            ${edu.details ? `<p class="text-gray-600 text-sm mt-1">${edu.details}</p>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </section>
                        ` : ''}

                        ${skills.length ? `
                            <section>
                                <h2 class="text-lg font-bold text-gray-900 uppercase tracking-wider mb-3 border-b border-gray-200 pb-1">Skills</h2>
                                <div class="flex flex-wrap gap-2">
                                    ${skills.map(skill => `
                                        <span class="px-3 py-1 bg-gray-100 text-gray-700 rounded text-sm font-medium">${skill}</span>
                                    `).join('')}
                                </div>
                            </section>
                        ` : ''}
                    </div>
                `;
            },

            renderClassicTemplate(personal, experience, education, skills) {
                return `
                    <div class="h-full font-serif text-gray-900">
                        <header class="text-center mb-8 border-b-2 border-gray-800 pb-6">
                            <h1 class="text-3xl font-bold mb-3 tracking-wide">${personal.name || 'Your Name'}</h1>
                            <div class="text-sm text-gray-700 space-y-1">
                                <p>${personal.title || 'Professional Title'}</p>
                                <p>${[personal.location, personal.email, personal.phone].filter(Boolean).join(' • ')}</p>
                                ${personal.website ? `<p>${personal.website}</p>` : ''}
                            </div>
                        </header>

                        ${personal.summary ? `
                            <section class="mb-6">
                                <h2 class="text-md font-bold uppercase tracking-widest mb-3 text-center border-b border-gray-300 pb-1">Professional Summary</h2>
                                <p class="text-sm leading-relaxed text-justify">${personal.summary}</p>
                            </section>
                        ` : ''}

                        ${experience.length ? `
                            <section class="mb-6">
                                <h2 class="text-md font-bold uppercase tracking-widest mb-4 text-center border-b border-gray-300 pb-1">Professional Experience</h2>
                                <div class="space-y-5">
                                    ${experience.map(exp => `
                                        <div class="text-sm">
                                            <div class="flex justify-between font-bold mb-1">
                                                <span>${exp.company || 'Company'}</span>
                                                <span>${exp.startDate || ''} – ${exp.endDate || ''}</span>
                                            </div>
                                            <div class="italic mb-2 text-gray-700">${exp.position || 'Position'}</div>
                                            <p class="leading-relaxed text-justify">${exp.description || ''}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </section>
                        ` : ''}

                        ${education.length ? `
                            <section class="mb-6">
                                <h2 class="text-md font-bold uppercase tracking-widest mb-4 text-center border-b border-gray-300 pb-1">Education</h2>
                                <div class="space-y-3 text-sm">
                                    ${education.map(edu => `
                                        <div>
                                            <div class="flex justify-between font-bold">
                                                <span>${edu.school || 'School'}</span>
                                                <span>${edu.year || ''}</span>
                                            </div>
                                            <div class="italic text-gray-700">${edu.degree || 'Degree'}</div>
                                            ${edu.details ? `<p class="text-xs mt-1 text-gray-600">${edu.details}</p>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </section>
                        ` : ''}

                        ${skills.length ? `
                            <section>
                                <h2 class="text-md font-bold uppercase tracking-widest mb-3 text-center border-b border-gray-300 pb-1">Skills</h2>
                                <p class="text-sm text-center">${skills.join(' • ')}</p>
                            </section>
                        ` : ''}
                    </div>
                `;
            },

            renderTechTemplate(personal, experience, education, skills) {
                return `
                    <div class="h-full bg-slate-50 font-mono text-slate-900">
                        <header class="mb-6 pb-4 border-b-2 border-slate-800">
                            <div class="text-xs text-slate-500 mb-1">&lt;header&gt;</div>
                            <h1 class="text-2xl font-bold text-slate-900 mb-2">${personal.name || 'Your Name'}</h1>
                            <div class="text-sm text-slate-600 space-y-1 pl-4 border-l-2 border-green-500">
                                <p class="text-green-700 font-bold">${personal.title || 'Professional Title'}</p>
                                <p>email: ${personal.email || 'email@example.com'}</p>
                                <p>phone: ${personal.phone || '+1 (555) 000-0000'}</p>
                                <p>location: ${personal.location || 'City, State'}</p>
                                ${personal.website ? `<p>web: ${personal.website}</p>` : ''}
                            </div>
                            <div class="text-xs text-slate-500 mt-1">&lt;/header&gt;</div>
                        </header>

                        ${personal.summary ? `
                            <section class="mb-6">
                                <div class="text-xs text-slate-500 mb-1">&lt;summary&gt;</div>
                                <p class="text-sm leading-relaxed pl-4 border-l-2 border-blue-400 text-slate-700">${personal.summary}</p>
                                <div class="text-xs text-slate-500 mt-1">&lt;/summary&gt;</div>
                            </section>
                        ` : ''}

                        ${experience.length ? `
                            <section class="mb-6">
                                <div class="text-xs text-slate-500 mb-2">&lt;experience&gt;</div>
                                <div class="space-y-4 pl-4 border-l-2 border-purple-400">
                                    ${experience.map(exp => `
                                        <div class="bg-white p-3 rounded border border-slate-200 shadow-sm">
                                            <div class="flex justify-between items-start mb-2">
                                                <div>
                                                    <span class="text-purple-700 font-bold">${exp.company || 'Company'}</span>
                                                    <span class="text-slate-400 mx-2">::</span>
                                                    <span class="text-slate-700">${exp.position || 'Position'}</span>
                                                </div>
                                                <span class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded">${exp.startDate || ''} → ${exp.endDate || ''}</span>
                                            </div>
                                            <p class="text-sm text-slate-600 leading-relaxed">${exp.description || ''}</p>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="text-xs text-slate-500 mt-2">&lt;/experience&gt;</div>
                            </section>
                        ` : ''}

                        ${education.length ? `
                            <section class="mb-6">
                                <div class="text-xs text-slate-500 mb-2">&lt;education&gt;</div>
                                <div class="space-y-3 pl-4 border-l-2 border-amber-400">
                                    ${education.map(edu => `
                                        <div class="flex justify-between items-center bg-white p-3 rounded border border-slate-200">
                                            <div>
                                                <span class="text-amber-700 font-bold">${edu.school || 'School'}</span>
                                                <p class="text-sm text-slate-600">${edu.degree || 'Degree'}</p>
                                            </div>
                                            <span class="text-xs text-slate-500 font-mono">${edu.year || ''}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="text-xs text-slate-500 mt-2">&lt;/education&gt;</div>
                            </section>
                        ` : ''}

                        ${skills.length ? `
                            <section>
                                <div class="text-xs text-slate-500 mb-2">&lt;skills&gt;</div>
                                <div class="flex flex-wrap gap-2 pl-4 border-l-2 border-green-400">
                                    ${skills.map(skill => `
                                        <span class="px-2 py-1 bg-slate-800 text-green-400 rounded text-xs font-bold">${skill}</span>
                                    `).join('')}
                                </div>
                                <div class="text-xs text-slate-500 mt-2">&lt;/skills&gt;</div>
                            </section>
                        ` : ''}
                    </div>
                `;
            }
        };

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
